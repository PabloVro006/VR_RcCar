<svg width="1000" height="500" xmlns="http://www.w3.org/2000/svg">
<style>
.box { fill:#1e1e2f; stroke:#00d4ff; stroke-width:2; rx:10; }
.text { fill:white; font-family:Arial; font-size:15px; text-anchor:middle; }
.arrow { stroke:#00d4ff; stroke-width:1.6; marker-end:url(#arrow); }
.boxtext { fill:white; font-family:Arial; font-size:13px; text-anchor:middle; }
</style>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#00d4ff"></path>
  </marker>
</defs>

<!-- Top Row -->
<rect x="60" y="60" width="140" height="55" class="box"></rect>
<text x="130" y="92" class="text">Steering Wheel</text>

<rect x="240" y="60" width="140" height="55" class="box"></rect>
<text x="310" y="92" class="text">PC (SDL3)</text>

<rect x="420" y="60" width="140" height="55" class="box"></rect>
<text x="490" y="92" class="text">STM32 TX</text>

<rect x="600" y="60" width="150" height="55" class="box"></rect>
<text x="675" y="92" class="text">NRF24 TX</text>

<!-- Middle Row -->
<rect x="600" y="180" width="150" height="55" class="box"></rect>
<text x="675" y="212" class="text">NRF24 RX</text>

<rect x="420" y="180" width="140" height="55" class="box"></rect>
<text x="490" y="212" class="text">STM32 RX</text>

<!-- Bottom Targets -->
<rect x="240" y="300" width="150" height="55" class="box"></rect>
<text x="315" y="332" class="text">Motor + Servo</text>

<rect x="600" y="300" width="150" height="55" class="box"></rect>
<text x="675" y="332" class="text">Camera</text>

<rect x="420" y="300" width="150" height="55" class="box"></rect>
<text x="495" y="332" class="text">VR / Browser</text>

<!-- Arrows top -->
<line x1="200" y1="87" x2="240" y2="87" class="arrow"></line>
<line x1="380" y1="87" x2="420" y2="87" class="arrow"></line>
<line x1="560" y1="87" x2="600" y2="87" class="arrow"></line>

<!-- RF link -->
<line x1="675" y1="115" x2="675" y2="180" class="arrow"></line>
  
<!-- Back to STM32 RX -->
<line x1="600" y1="207" x2="560" y2="207" class="arrow"></line>

<!-- Split outputs -->
<line x1="490" y1="235" x2="315" y2="300" class="arrow"></line>
<line x1="490" y1="235" x2="675" y2="300" class="arrow"></line>

<!-- Camera to VR -->
<line x1="490" y1="235" x2="490" y2="300" class="arrow"></line>
  
<!-- Labels -->
<text x="220" y="73" class="boxtext">USB</text>
<text x="400" y="73" class="boxtext">UART</text>
<text x="580" y="73" class="boxtext">SPI</text>
<text x="690" y="150" class="boxtext">RF</text>
<text x="580" y="195" class="boxtext">SPI</text>
<text x="510" y="275" class="boxtext">WiFi</text>

</svg>
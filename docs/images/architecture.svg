<svg width="1000" height="500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#1e1e2f; stroke:#00d4ff; stroke-width:2; rx:10; }
    .text { fill:white; font-family:Arial; font-size:14px; text-anchor:middle; }
    .arrow { stroke:#00d4ff; stroke-width:2; marker-end:url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#00d4ff"></path>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="50" y="200" width="120" height="50" class="box"></rect>
  <text x="110" y="230" class="text">Steering Wheel</text>

  <rect x="220" y="200" width="140" height="50" class="box"></rect>
  <text x="290" y="230" class="text">PC (SDL3)</text>

  <rect x="420" y="200" width="120" height="50" class="box"></rect>
  <text x="480" y="230" class="text">STM32 TX</text>

  <rect x="600" y="200" width="140" height="50" class="box"></rect>
  <text x="670" y="230" class="text">NRF24L01 TX</text>

  <rect x="600" y="100" width="140" height="50" class="box"></rect>
  <text x="670" y="130" class="text">NRF24L01 RX</text>

  <rect x="420" y="100" width="120" height="50" class="box"></rect>
  <text x="480" y="130" class="text">STM32 RX</text>

  <rect x="250" y="80" width="120" height="50" class="box"></rect>
  <text x="310" y="110" class="text">Motor + Servo</text>

  <rect x="250" y="20" width="120" height="50" class="box"></rect>
  <text x="310" y="50" class="text">Camera</text>

  <rect x="50" y="20" width="140" height="50" class="box"></rect>
  <text x="120" y="50" class="text">Browser / VR</text>

  <!-- Arrows -->
  <line x1="170" y1="225" x2="220" y2="225" class="arrow"></line>
  <line x1="360" y1="225" x2="420" y2="225" class="arrow"></line>
  <line x1="540" y1="225" x2="600" y2="225" class="arrow"></line>
  <line x1="670" y1="200" x2="670" y2="150" class="arrow"></line>
  <line x1="600" y1="125" x2="540" y2="125" class="arrow"></line>
  <line x1="420" y1="125" x2="370" y2="105" class="arrow"></line>
  <line x1="420" y1="125" x2="370" y2="45" class="arrow"></line>
  <line x1="250" y1="45" x2="190" y2="45" class="arrow"></line>

  <!-- Labels -->
  <text x="195" y="210" class="text" font-size="12">USB</text>
  <text x="390" y="210" class="text" font-size="12">UART</text>
  <text x="570" y="210" class="text" font-size="12">SPI</text>
  <text x="690" y="175" class="text" font-size="12">RF</text>
  <text x="210" y="30" class="text" font-size="12">WiFi</text>
</svg>